# Render Blueprint — backend API
# https://dashboard.render.com/blueprints → New Blueprint Instance → connect GitHub repo
services:
  - type: web
    name: marketplace-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/categories
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_TYPE
        value: postgres
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
